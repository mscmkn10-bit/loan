<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Calculator - Govind Singh Makrana</title>
    <style>
        :root {
            --primary-blue: #0066ff;
            --bg-light: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .calc-card {
            background: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h2 { color: #333; margin-bottom: 25px; }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .mode-btn {
            flex: 1;
            padding: 12px 5px;
            border: 2px solid var(--primary-blue);
            background: white;
            color: var(--primary-blue);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .mode-btn.active {
            background: var(--primary-blue);
            color: white;
        }

        #input-section {
            display: none;
            margin-top: 20px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            outline-color: var(--primary-blue);
        }

        .submit-btn {
            width: 100%;
            background: #28a745;
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        #result-box {
            display: none;
            margin-top: 25px;
            padding: 20px;
            background: #f0f7ff;
            border-radius: 10px;
            text-align: left;
        }

        .line-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            color: #555;
            font-size: 15px;
        }

        .net-payable {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px dashed #bcd;
            font-size: 22px;
            font-weight: 800;
            color: #000;
        }

        footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #ccc;
            width: 100%;
            max-width: 600px;
            text-align: center;
            color: var(--primary-blue);
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .highlight { font-weight: bold; color: #000; }
    </style>
</head>
<body>

<div class="calc-card">
    <h2>Loan Fee Calculator</h2>
    <p>Select Loan Category:</p>
    
    <div class="btn-group">
        <button id="btnLow" class="mode-btn" onclick="setMode('low')">Up to 10 Lakhs</button>
        <button id="btnHigh" class="mode-btn" onclick="setMode('high')">Above 10 Lakhs</button>
    </div>

    <div id="input-section">
        <label id="input-label" style="font-weight: 600;"></label>
        <input type="number" id="loanAmount" placeholder="Enter Amount (e.g. 1000000)">
        <button class="submit-btn" onclick="processCalculation()">Calculate Now</button>
    </div>

    <div id="result-box">
        <div class="line-item"><span>0.50% Fee:</span> <span id="res1" class="highlight"></span></div>
        <div class="line-item"><span>0.25% Fee:</span> <span id="res2" class="highlight"></span></div>
        <div class="line-item"><span id="extraLabel">Extra %:</span> <span id="res3" class="highlight"></span></div>
        <div class="line-item"><span>Fixed Charges:</span> <span class="highlight">₹500</span></div>
        
        <div class="net-payable">
            <span>Net Payable:</span>
            <span id="resTotal"></span>
        </div>
    </div>
</div>

<footer>
    © GOVIND SINGH MAKRANA
</footer>

<script>
    let mode = '';

    function setMode(selectedMode) {
        mode = selectedMode;
        document.getElementById('input-section').style.display = 'block';
        document.getElementById('result-box').style.display = 'none';
        
        // Button UI Toggle
        document.getElementById('btnLow').classList.toggle('active', mode === 'low');
        document.getElementById('btnHigh').classList.toggle('active', mode === 'high');
        
        // Label Update
        document.getElementById('input-label').innerText = 
            mode === 'low' ? "Loan Amount (Up to ₹10,00,000):" : "Loan Amount (Above ₹10,00,000):";
    }

    function processCalculation() {
        const amount = parseFloat(document.getElementById('loanAmount').value);
        
        if (!amount || amount <= 0) {
            alert("Please enter a valid loan amount.");
            return;
        }

        // Logic
        let part1 = amount * 0.0050; // 0.50%
        let part2 = amount * 0.0025; // 0.25%
        let part3 = 0;
        let fixed = 500;

        if (mode === 'low') {
            part3 = part2 * 0.30; // 30% for Up to 10L
            document.getElementById('extraLabel').innerText = "30% of 0.25%:";
        } else {
            part3 = part2 * 0.33; // 33% for Above 10L
            document.getElementById('extraLabel').innerText = "33% of 0.25%:";
        }

        let totalRaw = part1 + part2 + part3 + fixed;
        
        // Round Figure Logic (Agar point ke baad kuch bhi hai toh upar round karega)
        let finalTotal = Math.ceil(totalRaw);

        // UI Display
        document.getElementById('res1').innerText = "₹" + part1.toLocaleString();
        document.getElementById('res2').innerText = "₹" + part2.toLocaleString();
        document.getElementById('res3').innerText = "₹" + part3.toLocaleString(undefined, {minimumFractionDigits: 2});
        document.getElementById('resTotal').innerText = "₹" + finalTotal.toLocaleString();
        
        document.getElementById('result-box').style.display = 'block';
    }
</script>

</body>
</html>
