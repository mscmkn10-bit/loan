<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Calculator - Govind Singh Makrana</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        h2 { color: #1a73e8; margin-bottom: 20px; }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .option-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #1a73e8;
            background: white;
            color: #1a73e8;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .option-btn.active {
            background: #1a73e8;
            color: white;
        }

        #calc-section {
            display: none;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .submit-btn {
            width: 100%;
            background: #28a745;
            color: white;
            border: none;
            padding: 14px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .result-box {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: #e8f0fe;
            border-radius: 8px;
            text-align: left;
        }

        .res-line {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 15px;
            color: #333;
        }

        .total-line {
            border-top: 2px solid #1a73e8;
            margin-top: 10px;
            padding-top: 10px;
            font-size: 18px;
            font-weight: bold;
            color: #000;
        }

        footer {
            margin-top: 40px;
            color: #0066ff;
            font-weight: bold;
            letter-spacing: 1px;
            font-size: 14px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Loan Calculator</h2>
    <p>Please select an option:</p>
    
    <div class="btn-group">
        <button id="btnLow" class="option-btn" onclick="setMode('low')">Up to 10 Lakhs</button>
        <button id="btnHigh" class="option-btn" onclick="setMode('high')">Above 10 Lakhs</button>
    </div>

    <div id="calc-section">
        <label id="input-label" style="font-weight: 600;"></label>
        <input type="number" id="loanAmount" placeholder="Enter Amount (e.g. 1000000)">
        <button class="submit-btn" onclick="calculate()">Submit & Calculate</button>
        
        <div id="result" class="result-box">
            <div class="res-line"><span>0.50% Amount:</span> <span id="r1"></span></div>
            <div class="res-line"><span>0.25% Amount:</span> <span id="r2"></span></div>
            <div class="res-line"><span id="tax-label">Extra:</span> <span id="r3"></span></div>
            <div class="res-line"><span>Fixed Charge:</span> <span>₹500</span></div>
            <div class="res-line total-line"><span>Net Payable:</span> <span id="rTotal"></span></div>
        </div>
    </div>
</div>

<footer>
    © GOVIND SINGH MAKRANA
</footer>

<script>
    let currentMode = '';

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('calc-section').style.display = 'block';
        document.getElementById('result').style.display = 'none';
        document.getElementById('loanAmount').value = '';
        
        document.getElementById('btnLow').classList.toggle('active', mode === 'low');
        document.getElementById('btnHigh').classList.toggle('active', mode === 'high');
        
        document.getElementById('input-label').innerText = 
            mode === 'low' ? "Enter Amount (Up to 10L):" : "Enter Amount (Above 10L):";
    }

    function calculate() {
        const amount = parseFloat(document.getElementById('loanAmount').value);
        if (!amount || amount <= 0) {
            alert("Please enter a valid amount");
            return;
        }

        // 1. Calculate 0.50% and Round Up if decimal exists
        let p50 = Math.ceil(amount * 0.0050); 
        
        // 2. Calculate 0.25% and Round Up if decimal exists
        let p25 = Math.ceil(amount * 0.0025); 

        // 3. Calculate Extra Percentage based on selection
        let extra = 0;
        if (currentMode === 'low') {
            extra = p25 * 0.30; // 30% of 0.25% amount
            document.getElementById('tax-label').innerText = "30% of 0.25%:";
        } else {
            extra = p25 * 0.33; // 33% of 0.25% amount
            document.getElementById('tax-label').innerText = "33% of 0.25%:";
        }

        // Fixed Charge
        const fixed = 500;

        // Total Net Payable
        let total = p50 + p25 + extra + fixed;

        // Final UI Display
        document.getElementById('r1').innerText = "₹" + p50.toLocaleString();
        document.getElementById('r2').innerText = "₹" + p25.toLocaleString();
        document.getElementById('r3').innerText = "₹" + extra.toFixed(2).toLocaleString();
        document.getElementById('rTotal').innerText = "₹" + total.toLocaleString();
        
        document.getElementById('result').style.display = 'block';
    }
</script>

</body>
</html>
